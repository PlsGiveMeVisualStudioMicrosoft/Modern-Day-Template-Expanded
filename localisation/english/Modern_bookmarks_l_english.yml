l_english:
 MODERN_DATE_DESC:0 "Welcome to 2019. Everything’s perfect, the economy’s humming, people are happy… nothing bad could possibly happen… right?"

 ENG_GATHERING_STORM_DESC:0 "The United Kingdom has spent the decades since the end of the Cold War navigating the shifting tides of globalization, European integration, and domestic political change. Once the center of a vast empire, Britain now finds itself redefining its place in the world.\n\nThe decision to leave the European Union has triggered political turmoil at home and uncertainty abroad. As global tensions rise and alliances shift, the United Kingdom must determine what role it will play in an increasingly unstable world."

 FRA_GATHERING_STORM_DESC:0 "France remains one of Europe's central powers, balancing its republican traditions with the pressures of globalization and political polarization. Economic reforms and social unrest have dominated the domestic landscape, while the country continues to assert its influence within the European Union and abroad.\n\nYet populist movements, security concerns, and geopolitical rivalries threaten the stability of the continent. France must decide how to preserve its ideals while navigating the storms gathering over Europe."

 GER_GATHERING_STORM_DESC:0 "Germany stands as the economic engine of Europe and a central pillar of the European Union. Decades of stability and prosperity have elevated the country into a position of immense influence within the continent.\n\nHowever, political fragmentation, debates over migration, and growing geopolitical tensions challenge the foundations of the post-Cold War order. As uncertainty spreads across Europe, Germany must determine whether it will lead the continent through the coming crises."

 SOV_GATHERING_STORM_DESC:0 "The Russian Federation emerged from the collapse of the Soviet Union weakened but determined to reclaim its influence on the global stage. After years of economic recovery and political consolidation, Moscow has once again become a decisive actor in international affairs.\n\nConflicts in Ukraine and Syria, strained relations with the West, and growing rivalry with NATO have placed Russia at the center of a new era of geopolitical competition."

 USA_GATHERING_STORM_DESC:0 "Since the end of the Cold War, the United States has stood as the world's dominant superpower. Its military reach, economic strength, and cultural influence shape global affairs on an unprecedented scale.\n\nYet the international order it helped build is under strain. Strategic competition with China and Russia is intensifying, alliances are being tested, and domestic political divisions are deepening. Whether America chooses renewed leadership or a more cautious path will shape the future of the world."

 POL_GATHERING_STORM_DESC:1 "Poland has come further in thirty years than most nations manage in a century. From the ruins of communism it built a thriving democracy, joined NATO and the European Union, and became one of the fastest growing economies on the continent.\n\nBut the old anxieties have not disappeared. Russia's annexation of Crimea and the war in eastern Ukraine have brought the spectre of eastern aggression back to life. At home, the Law and Justice government is locked in a bitter struggle with Brussels over the rule of law. Poland finds itself caught, once again, between giants — determined this time to be neither victim nor bystander."

 PRC_GATHERING_STORM_DESC:0 "The People's Republic of China has risen faster than any nation in history. Hundreds of millions have been lifted from poverty, cities have sprung from nothing, and the Belt and Road Initiative is redrawing the map of global commerce. Xi Jinping has consolidated power to a degree unseen since Mao, abolishing term limits and placing himself at the centre of everything.\n\nBut the contradictions are mounting. Trade war with the United States threatens the export model that powered China's rise. Hong Kong is restless. Taiwan remains unresolved. And in Xinjiang, policies that Beijing calls counter-terrorism are drawing international condemnation. China is on the cusp of greatness — or something far more turbulent."